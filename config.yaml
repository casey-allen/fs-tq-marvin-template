# --- Team Digest ---
# NOTE: The stock engineering digest (Jira/GitHub) doesn't fit Site Selection.
# Casey's daily digest is two staggered scheduled tasks (split to avoid an MCP
# cold-start timeout — a single 5-server task kept dying at ~10 min before pulling data):
#   - morning-briefing          (~6:53am CDT): Kaiser pipeline + calendar -> daily note
#   - morning-briefing-followup (~7:14am CDT): Slack + email -> appends + posts full briefing to Slack DM
# Delivered to his Slack DM and Obsidian daily note. Each connects only 2 MCP servers.
# Managed via: ~/.claude/scheduled-tasks/{morning-briefing,morning-briefing-followup}/SKILL.md
digest:
  workstreams: []
  enabled: false   # superseded by morning-briefing scheduled task
  lookback_hours: 24

